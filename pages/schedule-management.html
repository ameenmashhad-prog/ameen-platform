<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0B6E4F">
  <title>إدارة الجدول — مدارس أمين الرضا</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .app-layout { display: flex; min-height: 100vh; }
    .app-sidebar { position: fixed; inset-block: 0; inset-inline-end: 0; width: 260px; background: var(--surface); border-inline-start: 1px solid var(--border-subtle); z-index: 200; display: flex; flex-direction: column; transition: transform var(--transition-standard); }
    .app-main { flex: 1; margin-inline-end: 260px; min-height: 100vh; display: flex; flex-direction: column; }
    .app-topbar { height: var(--header-height); background: var(--surface); padding: 0 var(--space-5); border-block-end: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
    .sidebar-brand { padding: var(--space-5); border-block-end: 1px solid var(--border-subtle); display: flex; align-items: center; gap: var(--space-3); }
    .sidebar-brand-logo { width: 44px; height: 44px; color: var(--primary); flex-shrink: 0; }
    .sidebar-user { padding: var(--space-3) var(--space-4); margin: var(--space-3); background: var(--surface-2); border-radius: var(--radius-md); display: flex; align-items: center; gap: var(--space-3); }
    .sidebar-user-avatar { width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
    .sidebar-nav { flex: 1; padding: var(--space-2) var(--space-3); overflow-y: auto; list-style: none; margin: 0; }
    .sidebar-footer { padding: var(--space-3); border-block-start: 1px solid var(--border-subtle); }
    .logout-btn { width: 100%; padding: var(--space-3); background: var(--danger-tint); color: var(--danger); border: 1px solid var(--danger); border-radius: var(--radius-md); cursor: pointer; font-family: inherit; font-weight: 600; min-height: var(--touch-min); transition: all var(--transition-fast); }
    .logout-btn:hover { background: var(--danger); color: white; }
    #main-content { padding: var(--space-6); max-width: 1400px; margin: 0 auto; flex: 1; }
    .mobile-toggle { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--text-primary); width: var(--touch-min); height: var(--touch-min); display: flex; align-items: center; justify-content: center; }
    .section-page-head { margin-block-end: var(--space-5); }
    .section-page-head h1 { font-size: var(--text-h1); color: var(--accent); margin-block-end: var(--space-2); }
    .section-page-head p { color: var(--text-secondary); }
    .schedule-grid { display: grid; grid-template-columns: 100px repeat(7, 1fr); gap: 1px; background: var(--border-subtle); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; }
    .schedule-cell { background: var(--surface); padding: var(--space-2); min-height: 80px; font-size: var(--text-xs); }
    .schedule-cell.header { background: var(--surface-2); font-weight: 700; text-align: center; padding: var(--space-3); }
    .schedule-cell.time { background: var(--surface-2); font-weight: 600; display: flex; align-items: center; justify-content: center; }
    .schedule-slot { background: var(--primary-50); color: var(--primary-700); border-radius: var(--radius-sm); padding: var(--space-1); margin-bottom: 2px; cursor: pointer; border: 1px solid var(--primary-200); }
    @media (max-width: 1023px) {
      .app-sidebar { width: 72px; }
      .sidebar-brand-text, .sidebar-user > div:last-child, .sidebar-nav-label { display: none; }
      .app-main { margin-inline-end: 72px; }
    }
    @media (max-width: 639px) {
      .app-sidebar { transform: translateX(100%); width: 280px; }
      .app-sidebar.open { transform: translateX(0); }
      .sidebar-brand-text, .sidebar-user > div:last-child, .sidebar-nav-label { display: block; }
      .app-main { margin-inline-end: 0; padding-block-end: 80px; }
      #main-content { padding: var(--space-4); }
      .schedule-grid { grid-template-columns: 60px repeat(7, 1fr); }
      .schedule-cell { padding: 1px; font-size: 10px; }
      .schedule-slot { padding: 1px; }
    }
  </style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="ScheduleApp.toggleSidebar()"></div>

<div class="app-layout">
  <aside class="app-sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-logo" id="sidebarLogo"></div>
      <div class="sidebar-brand-text">
        <h1 style="font-size:var(--text-body);font-weight:700;margin:0;">إدارة الجدول</h1>
        <small style="font-size:var(--text-xs);color:var(--text-secondary);">مدارس أمين الرضا</small>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="sidebar-user-avatar" id="userAvatar">م</div>
      <div>
        <div style="font-weight:600;font-size:14px;color:var(--text-primary);" id="userName">جاري...</div>
        <div style="font-size:11px;color:var(--text-secondary);" id="userRole">...</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="AminCore.logout()">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="app-main">
    <header class="app-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-toggle" onclick="ScheduleApp.toggleSidebar()">☰</button>
        <h2 id="pageTitle" style="font-size:var(--text-h3);margin:0;">إدارة الجدول</h2>
      </div>
      <button class="mobile-toggle" onclick="AminCore.toggleDarkMode()">☀</button>
    </header>

    <div id="main-content">
      <div class="section-page-head">
        <h1>إدارة الجدول الأسبوعي</h1>
        <p>تنظيم الحصص للصفوف والمواد</p>
      </div>
      <div class="amin-card" style="margin-bottom:var(--space-4);">
        <div class="amin-card-header"><div class="amin-card-title">إضافة / تعديل حصة</div></div>
        <form id="scheduleForm" onsubmit="ScheduleApp.saveSlot(event)">
          <div class="amin-grid amin-grid-4">
            <div class="amin-field"><label class="amin-label">الصف</label><select id="classSelect" class="amin-select" required></select></div>
            <div class="amin-field"><label class="amin-label">المادة</label><select id="subjectSelect" class="amin-select" required></select></div>
            <div class="amin-field"><label class="amin-label">المعلم</label><select id="teacherSelect" class="amin-select" required></select></div>
            <div class="amin-field"><label class="amin-label">اليوم</label><select id="daySelect" class="amin-select" required></select></div>
          </div>
          <div class="amin-grid amin-grid-2">
            <div class="amin-field"><label class="amin-label">رقم الحصة</label><input type="number" id="periodInput" class="amin-input" min="1" max="8" required></div>
            <div class="amin-field"><label class="amin-label">اسم الحصة</label><input type="text" id="periodNameInput" class="amin-input" placeholder="مثال: الحصة الأولى"></div>
          </div>
          <button type="submit" class="amin-btn amin-btn-primary">حفظ</button>
          <button type="button" class="amin-btn amin-btn-ghost" onclick="ScheduleApp.resetForm()">إلغاء</button>
        </form>
      </div>
      <div id="scheduleGrid"></div>
    </div>
  </main>
</div>

<nav class="amin-bottom-nav" id="bottomNav"></nav>

<script src="/libs/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/platform-modules.js"></script>
<script src="/js/signature-star.js"></script>
<script src="/js/renderHelpers.js"></script>
<script src="/js/core.js"></script>
<script src="/js/schedule-management.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const logo = document.getElementById('sidebarLogo');
    if (logo && window.AminStar) logo.appendChild(AminStar.logo({ size: 44, color: 'var(--primary)' }));
  });
</script>
</body>
</html>
